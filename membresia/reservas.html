<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reservas - Alquiler de Vehículos</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header>
        <h1>Reservas de Vehículos</h1>
        <nav>
            <ul>
                <li><a href="index.html">Inicio</a></li>
                <li><a href="dashboard.html">Pagina Principal</a></li>
                <li><a href="perfil.html">Perfil</a></li>
                <li><a href="logout.html">Cerrar Sesión</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <!-- Sección de Nueva Reserva -->
        <section class="nueva-reserva">
            <h2>Nueva Reserva</h2>
            <form id="reserva-form">
                <label for="nombre">Nombre:</label>
                <input type="text" id="nombre" name="nombre" required>

                <label for="segundo_nombre">Segundo Nombre:</label>
                <input type="text" id="segundo_nombre" name="segundo_nombre">

                <label for="apellido">Apellido:</label>
                <input type="text" id="apellido" name="apellido" required>

                <label for="segundo_apellido">Segundo Apellido:</label>
                <input type="text" id="segundo_apellido" name="segundo_apellido">

                <label for="cedula">Cédula:</label>
                <input type="text" id="cedula" name="cedula" required>

                <label for="edad">Edad:</label>
                <input type="number" id="edad" name="edad" required>

                <label for="direccion">Dirección:</label>
                <input type="text" id="direccion" name="direccion" required>

                <label for="modelo_auto">Vehículo:</label>
                <select id="modelo_auto" name="modelo_auto" required>
                    <option value="">Selecciona un vehículo</option>
                    <option value="Toyota Corolla">Toyota Corolla</option>
                    <option value="Honda Civic">Honda Civic</option>
                    <option value="Ford Mustang">Ford Mustang</option>
                </select>

                <label for="metodo_pago">Método de Pago:</label>
                <select id="metodo_pago" name="metodo_pago" required>
                    <option value="">Selecciona un método de pago</option>
                    <option value="Tarjeta de Credito">Tarjeta de Crédito</option>
                    <option value="Dinero en Efectivo">Dinero en Efectivo</option>
                    <option value="Divisas">Divisas</option>
                </select>

                <label for="total">Total:</label>
                <input type="number" id="total" name="total" required>

                <button type="submit" class="btn">Reservar Ahora</button>
            </form>
            <div id="reserva-resultado"></div>
        </section>
    </main>

    <footer>
        <p>&copy; 2023 Alquiler de Vehículos. Todos los derechos reservados.</p>
    </footer>

    <script>
        document.getElementById('reserva-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const form = e.target;
            const formData = new FormData(form);
            const data = Object.fromEntries(formData.entries());

            const response = await fetch('http://localhost:5001/alquiler', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(data)
            });

            const result = await response.json();
            const resultadoDiv = document.getElementById('reserva-resultado');

            if (response.ok) {
                resultadoDiv.innerHTML = `<p>¡Reserva creada con éxito! ID de alquiler: ${result.alquiler_id}</p>
                                          <a href="http://localhost:5001/alquiler/${result.alquiler_id}/pdf" class="btn">Descargar PDF</a>`;
            } else {
                resultadoDiv.innerHTML = `<p>Error al crear la reserva: ${result.error}</p>`;
            }
        });
    </script>
</body>
</html>
